# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: ceph-toolbox
  version: "0.0.1"

components:
  - name: ceph-toolbox
    required: true
    manifests:
      - name: ceph-toolbox
        namespace: rook-ceph
        files:
          - https://raw.githubusercontent.com/rook/rook/v1.13.5/deploy/examples/toolbox.yaml
    images: 
      - quay.io/ceph/ceph:v18.2.1